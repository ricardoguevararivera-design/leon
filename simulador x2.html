    // --- FUNCIÓN ASÍNCRONA: ENVIAR REPORTE (Ciudadano) ---
    async function enviarReporte() {
        const tipo = document.getElementById('tipoIncidente').value;
        const comentario = document.getElementById('comentario').value.trim() || 'Sin detalles.';
        
        // Deshabilitar botón para evitar dobles envíos
        const btn = document.querySelector('.btn-danger');
        btn.textContent = 'Enviando...';
        btn.disabled = true;

        // Insertar registro en la base de datos real
        const { data, error } = await client
            .from('reportes')
            .insert([
                { 
                    tipo: tipo, 
                    comentario: comentario, 
                    estado: 'Pendiente'
                }
            ]);

        if (error) {
            console.error("Error en la BD:", error);
            document.getElementById('mensajeCiudadano').innerHTML = '❌ Hubo un error al enviar.';
        } else {
            document.getElementById('mensajeCiudadano').innerHTML = '✅ Alerta enviada exitosamente a la central.';
            document.getElementById('comentario').value = ''; // Limpiar campo
        }

        // Restaurar botón
        btn.textContent = '🚨 ENVIAR ALERTA';
        btn.disabled = false;
    }

    // --- CARGA INICIAL: TRAER DATOS DE LA BD ---
    async function cargarReportesHistoricos() {
        const { data, error } = await client
            .from('reportes')
            .select('*')
            .order('created_at', { ascending: false }); // Los más nuevos primero

        if (!error && data) {
            reportes = data;
            actualizarVistas(); // Tu función original de renderizado
        }
    }
