<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ojo de los Justos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: #0a0e17; color: #e6edf3; padding-bottom: 80px; min-height: 100vh; }
        .header { background: #0d1117; padding: 18px 20px 10px; border-bottom: 1px solid #21262d; position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.2rem; color: #f85149; letter-spacing: 1px; }
        .header .badge-version { background: #21262d; padding: 4px 12px; border-radius: 20px; font-size: 0.6rem; color: #8b949e; border: 1px solid #30363d; }
        .page { display: none; padding: 16px 20px 30px; animation: fadeUp 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0d1117; border-top: 1px solid #21262d; display: flex; justify-content: space-around; padding: 8px 0 env(safe-area-inset-bottom); z-index: 20; }
        .nav-item { display: flex; flex-direction: column; align-items: center; background: transparent; border: none; color: #8b949e; font-size: 0.65rem; padding: 4px 12px; cursor: pointer; transition: 0.2s; border-radius: 8px; }
        .nav-item .icon { font-size: 1.8rem; line-height: 1; }
        .nav-item.active { color: #f85149; }
        .nav-item.active .icon { transform: scale(1.1); }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 18px; margin-bottom: 20px; }
        .card-title { font-weight: 700; margin-bottom: 12px; font-size: 1.1rem; color: #f0f6fc; }
        .card-sub { color: #8b949e; font-size: 0.85rem; margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin: 15px 0 6px; font-size: 0.9rem; }
        select, textarea { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 10px; color: white; font-size: 1rem; }
        textarea { height: 80px; resize: vertical; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 50px; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 16px; transition: 0.2s; }
        .btn-danger { background: #da3633; color: white; }
        .btn-danger:active { transform: scale(0.97); }
        .item-reporte { background: #0d1117; padding: 14px; border-radius: 12px; margin-bottom: 12px; border-left: 5px solid #f85149; }
        .item-reporte .row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
        .tag { display: inline-block; padding: 2px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: 600; }
        .tag-red { background: #da3633; color: white; }
        .tag-yellow { background: #d29922; color: black; }
        .tag-green { background: #238636; color: white; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-2 .poli-card { background: #0d1117; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #21262d; }
        .poli-card .estado { font-size: 0.7rem; margin-top: 4px; }
        .text-muted { color: #8b949e; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="header">
    <h1>👁️ OJO DE LOS JUSTOS</h1>
    <span class="badge-version">BETA 1.0</span>
</div>

<div id="page-ciudadano" class="page active">
    <div class="card">
        <div class="card-title">📝 Reporte Anónimo</div>
        <div class="card-sub">Tu identidad está protegida.</div>
        <label>Tipo de incidente</label>
        <select id="tipoIncidente">
            <option>💊 Venta de sustancias</option>
            <option>🔫 Presencia de armas</option>
            <option>⛓️ Retención ilegal</option>
            <option>👊 Riña callejera</option>
            <option>🕵️ Prófugo avistado</option>
        </select>
        <label>Comentario</label>
        <textarea id="comentario" placeholder="Ej: 3 sujetos en la esquina..."></textarea>
        <button class="btn btn-danger" onclick="enviarReporte()">🚨 ENVIAR ALERTA</button>
        <div id="mensajeCiudadano" style="margin-top: 12px; font-size: 0.9rem;"></div>
    </div>
    <div class="card">
        <div class="card-title">📋 Mis Alertas Enviadas</div>
        <div id="misReportes" class="text-muted">Aún no hay registros.</div>
    </div>
</div>

<div id="page-policia" class="page">
    <div class="card">
        <div class="card-title">🚨 Reportes Activos en tu Zona</div>
        <div id="listaReportesPolicia" class="text-muted">Esperando reportes...</div>
    </div>
</div>

<div id="page-central" class="page">
    <div class="card">
        <div class="card-title">📊 Dashboard de Monitoreo</div>
        <p>Total Alertas: <strong id="totalReportes">0</strong></p>
        <div style="margin-top:15px; padding:20px; background:#0d1117; border-radius:10px; text-align:center; border:1px dashed #30363d; color:#8b949e;">
            🗺️ Mapa GPS (Próximamente)
        </div>
    </div>
</div>

<div class="bottom-nav">
    <button class="nav-item active" onclick="cambiarPagina('ciudadano', this)">
        <span class="icon">👤</span><span>Ciudadano</span>
    </button>
    <button class="nav-item" onclick="cambiarPagina('policia', this)">
        <span class="icon">👮</span><span>Policía</span>
    </button>
    <button class="nav-item" onclick="cambiarPagina('central', this)">
        <span class="icon">📊</span><span>Central</span>
    </button>
</div>

<script>
    let reportes = [];
    let idCounter = 1;

    function cambiarPagina(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        btn.classList.add('active');
    }

    function enviarReporte() {
        const tipo = document.getElementById('tipoIncidente').value;
        const comentario = document.getElementById('comentario').value.trim() || 'Sin comentarios.';
        
        const nuevo = { id: idCounter++, tipo: tipo, comentario: comentario, estado: 'Pendiente' };
        reportes.push(nuevo);
        
        document.getElementById('mensajeCiudadano').innerHTML = `✅ Alerta #${nuevo.id} recibida por la central.`;
        document.getElementById('comentario').value = '';
        
        actualizarVistas();
    }

    function actualizarVistas() {
        let htmlRep = '';
        [...reportes].reverse().forEach(r => {
            htmlRep += `<div class="item-reporte">
                <div class="row"><div><strong>#${r.id}</strong> ${r.tipo}</div><span class="tag tag-red">${r.estado}</span></div>
                <div style="font-size:0.85rem; color:#8b949e; margin-top:6px;">${r.comentario}</div>
            </div>`;
        });
        
        document.getElementById('listaReportesPolicia').innerHTML = htmlRep || 'Sin reportes.';
        document.getElementById('misReportes').innerHTML = htmlRep || 'Aún no hay registros.';
        document.getElementById('totalReportes').textContent = reportes.length;
    }
</script>
</body>
</html>
